disabled_rules:
  - trailing_comma
  - identifier_name

included:
  - Plakaki
  - Project.swift
  - Tuist.swift
  - Tuist

excluded:
  - Derived
  - Plakaki.xcodeproj
  - Plakaki.xcworkspace
  - Tuist/.build

opt_in_rules:
  - array_init
  - closure_spacing
  - contains_over_first_not_nil
  - empty_count
  - empty_string
  - explicit_init
  - fallthrough
  - first_where
  - operator_usage_whitespace
  - overridden_super_call
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument

line_length:
  warning: 120
  error: 140
  ignores_comments: true
  ignores_urls: true

reporter: xcode
